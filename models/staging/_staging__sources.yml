version: 2

sources:
  - name: raw_data
    description: "Dataset que contém os dados brutos e heterogêneos de fraude e marketing (Ingeridos via Airflow)."
    schema: raw_data
    database: projetootg
    loader: bigquery

    tables:
      - name: players
        description: "Cadastro original dos jogadores da plataforma."
        columns:
          - name: player_id
            description: "Chave primária exclusiva de identificação do jogador."
            tests:
              - unique
              - not_null
          - name: email
            description: "Endereço de e-mail eletrônico do usuário cadastrado."
            tests:
              - not_null
          - name: city
            description: "Cidade informada pelo usuário no momento da criação da conta."
          - name: created_at
            description: "Data e hora exata em que o cadastro foi concluído no sistema."

      - name: sessions
        description: "Logs de acessos e metadados de navegação das sessões dos usuários."
        columns:
          - name: session_id
            description: "Identificador único da sessão de acesso."
            tests:
              - unique
              - not_null
          - name: player_id
            description: "Chave de ligação com a tabela de jogadores."
            tests:
              - not_null
          - name: ip
            description: "Endereço IP público utilizado para realizar o acesso."
            tests:
              - not_null
          - name: device
            description: "Tipo de dispositivo eletrônico utilizado para navegar na plataforma."
            tests:
              - accepted_values:
                  values: ['mobile', 'desktop', 'tablet']
          - name: timestamp
            description: "Data e hora exata em que o login ou evento de sessão ocorreu."

      - name: transactions
        description: "Histórico de movimentações financeiras executadas dentro do sistema."
        columns:
          - name: transaction_id
            description: "Identificador único da transação financeira."
            tests:
              - unique
              - not_null
          - name: player_id
            description: "Chave de ligação para identificar o autor da movimentação."
            tests:
              - not_null
          - name: type
            description: "Tipo da operação financeira realizada."
            tests:
              - accepted_values:
                  values: ['deposit', 'withdraw', 'bet']
          - name: amount
            description: "Valor monetário total envolvido na transação."
          - name: timestamp
            description: "Data e hora em que a transação financeira foi computada."

      - name: affiliate_cpa_ftd
        description: "Métricas consolidadas de aquisição de tráfego enviadas pelos parceiros."
        columns:
          - name: affiliate_id
            description: "Identificador único do parceiro afiliado."
            tests:
              - not_null
          - name: player_id
            description: "Chave de ligação com o jogador que realizou o cadastro via link."
            tests:
              - unique
              - not_null
          - name: country
            description: "Código do país de origem do tráfego capturado."
          - name: clicks
            description: "Volume de cliques gerados no link de indicação do afiliado."
          - name: registrations
            description: "Indicador binário ou contagem de registros originados."
          - name: ftd
            description: "First Time Deposit: Indicador binário se o usuário fez seu primeiro depósito (1 para Sim, 0 para Não)."
            tests:
              - accepted_values:
                  values: [0, 1]
                  quote: false
          - name: cpa_value
            description: "Valor da comissão (CPA) a ser pago ao afiliado pela conversão."
