version: 2

sources:
  - name: raw_data
    tables:
      # --- TABELA DE PLAYERS (JSON bruto, apenas string_field_0) ---
      - name: players
        description: "Tabela bruta contendo os payloads de cadastro de jogadores em formato JSON."
        columns:
          - name: string_field_0
            description: "Linha bruta contendo o JSON completo do cadastro do jogador."

      # --- TABELA DE SESSIONS (JSON bruto, apenas string_field_0) ---
      - name: sessions
        description: "Tabela bruta contendo os logs de acessos em formato JSON."
        columns:
          - name: string_field_0
            description: "Linha bruta contendo o JSON completo do log da sessão."

      # --- TABELA DE TRANSAÇÕES (CSV Estruturado) ---
      - name: transactions
        description: "Histórico de movimentações financeiras executadas dentro do sistema."
        columns:
          - name: transaction_id
            description: "Identificador único da transação financeira."
          - name: player_id
            description: "Chave de ligação para identificar o autor da movimentação."
          - name: type
            description: "Tipo da operação financeira realizada."
          - name: amount
            description: "Valor monetário total envolvido na transação."
          - name: timestamp
            description: "Data e hora em que a transação financeira foi computada."

      # --- TABELA DE AFILIADOS (CSV Estruturado) ---
      - name: affiliate_cpa_ftd
        description: "Métricas consolidadas de aquisição de tráfego enviadas pelos parceiros."
        columns:
          - name: affiliate_id
            description: "Identificador único do parceiro afiliado."
          - name: player_id
            description: "Chave de ligação com o jogador que realizou o cadastro via link."
          - name: country
            description: "Código do país de origem do tráfego capturado."
          - name: clicks
            description: "Volume de cliques gerados no link de indicação do afiliado."
          - name: registrations
            description: "Indicador binário ou contagem de registros originados."
          - name: ftd
            description: "First Time Deposit: Indicador binário se o usuário fez seu primeiro depósito (1 para Sim, 0 para Não)."
          - name: cpa_value
            description: "Valor da comissão (CPA) a ser pago ao afiliado pela conversão."