version: 2

models:
  - name: fct_affiliate_marketing_performance
    description: "Tabela Fato Gold com métricas agregadas de performance, custos de CPA e qualidade do tráfego trazido por parceiros afiliados."
    columns:
      - name: affiliate_id
        description: "Chave primária do parceiro afiliado analisado."
        tests:
          - not_null
      - name: total_cpa_payout
        description: "Valor total de comissão em CPA gerado e acumulado pelo afiliado."
      - name: total_fraudulent_players_brought
        description: "Métrica de qualidade: quantidade total de usuários indicados por este afiliado que foram marcados como fraudulentos."
