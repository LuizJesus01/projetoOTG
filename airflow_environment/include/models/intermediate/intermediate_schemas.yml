version: 2

models:
  - name: int_player_financial_behavior
    description: "Modelo intermediário que consolida o perfil cadastral do jogador com agregados financeiros de depósitos, saques e apostas."
    columns:
      - name: player_id
        description: "Chave primária do jogador (herdada da stg_players)."
        tests:
          - unique
          - not_null
      - name: total_deposited_amount
        description: "Valor total acumulado de depósitos realizados pelo jogador."
      - name: total_withdrawn_amount
        description: "Valor total acumulado de saques efetuados pelo jogador."
      - name: total_bet_amount
        description: "Valor total acumulado de dinheiro apostado em jogos."

  - name: int_player_sessions_behavior
    description: "Modelo intermediário focado no comportamento de navegação, mapeando a diversidade de conexões por usuário."
    columns:
      - name: player_id
        description: "Chave de identificação do jogador."
        tests:
          - unique
          - not_null
      - name: distinct_ips_count
        description: "Quantidade de endereços de IP distintos utilizados pelo jogador para acessar a plataforma."
      - name: distinct_devices_count
        description: "Quantidade de aparelhos/dispositivos diferentes utilizados pelo jogador."
